name: Deploy to Hostinger VPS

# Required GitHub Secrets:
#   VPS_HOST           — VPS IP address or hostname
#   VPS_USERNAME       — SSH login user (e.g. root)
#   VPS_SSH_KEY        — Private SSH key (full contents of id_rsa / id_ed25519)
#   VPS_SSH_PORT       — SSH port (optional, defaults to 22)
#   VPS_APP_DIR        — Absolute path to repo on VPS (e.g. /opt/fets-live)
#   VPS_CONTAINER_NAME — Docker container name (e.g. fets-live)
#   VPS_HOST_PORT      — Host port mapped to container port 80 (e.g. 80)
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#   VITE_GBP_CLIENT_ID
#   VITE_GBP_LOCATION_COCHIN
#   VITE_GBP_LOCATION_CALICUT
#   VITE_APP_URL       — Production URL (e.g. https://fets.live)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GBP_CLIENT_ID: ${{ secrets.VITE_GBP_CLIENT_ID }}
          VITE_GBP_LOCATION_COCHIN: ${{ secrets.VITE_GBP_LOCATION_COCHIN }}
          VITE_GBP_LOCATION_CALICUT: ${{ secrets.VITE_GBP_LOCATION_CALICUT }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          envs: VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_GBP_CLIENT_ID,VITE_GBP_LOCATION_COCHIN,VITE_GBP_LOCATION_CALICUT,VITE_APP_URL
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            CONTAINER="${{ secrets.VPS_CONTAINER_NAME }}"
            HOST_PORT="${{ secrets.VPS_HOST_PORT }}"
            IMAGE="fets-live:latest"

            echo "==> Pulling latest code"
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Building Docker image"
            docker build \
              --build-arg VITE_SUPABASE_URL="$VITE_SUPABASE_URL" \
              --build-arg VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" \
              --build-arg VITE_GBP_CLIENT_ID="$VITE_GBP_CLIENT_ID" \
              --build-arg VITE_GBP_LOCATION_COCHIN="$VITE_GBP_LOCATION_COCHIN" \
              --build-arg VITE_GBP_LOCATION_CALICUT="$VITE_GBP_LOCATION_CALICUT" \
              --build-arg VITE_APP_URL="$VITE_APP_URL" \
              -t "$IMAGE" .

            echo "==> Stopping old container"
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm   "$CONTAINER" 2>/dev/null || true

            echo "==> Starting new container"
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p "${HOST_PORT}:80" \
              "$IMAGE"

            echo "==> Pruning dangling images"
            docker image prune -f

            echo "==> Deploy complete"
